<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer precision ring (Lathe concept) -->
  <circle cx="50" cy="50" r="45" stroke="#00D4FF" stroke-width="1" stroke-dasharray="2 4"/>
  
  <!-- Core Diamond structure -->
  <path d="M50 15L85 50L50 85L15 50L50 15Z" stroke="#00D4FF" stroke-width="2" fill="rgba(0, 212, 255, 0.05)"/>
  
  <!-- Quantum Nodes -->
  <circle cx="50" cy="15" r="4" fill="#00D4FF">
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="85" cy="50" r="4" fill="#00D4FF">
    <animate attributeName="r" values="3;5;3" dur="2s" begin="0.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="50" cy="85" r="4" fill="#00D4FF">
    <animate attributeName="r" values="3;5;3" dur="2s" begin="1s" repeatCount="indefinite" />
  </circle>
  <circle cx="15" cy="50" r="4" fill="#00D4FF">
    <animate attributeName="r" values="3;5;3" dur="2s" begin="1.5s" repeatCount="indefinite" />
  </circle>
  
  <!-- Center Focus Node -->
  <circle cx="50" cy="50" r="6" fill="#00D4FF" stroke="white" stroke-width="1"/>
  
  <!-- Connection Lines -->
  <line x1="50" y1="15" x2="50" y2="85" stroke="#00D4FF" stroke-width="0.5" opacity="0.3"/>
  <line x1="15" y1="50" x2="85" y2="50" stroke="#00D4FF" stroke-width="0.5" opacity="0.3"/>
</svg>
